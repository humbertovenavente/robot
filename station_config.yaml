station_id: station-1
camera_index: 0
yolo_model_path: models/best.pt
yolo_confidence_threshold: 0.40
yolo_imgsz: 640
qr_padding_pct: 0.15         # 15% padding on YOLO bbox before pyzbar (Pitfall #4)
qr_retry_count: 3
qr_settle_delay_ms: 500       # Delay after package arrival before decode (Pitfall #3)
robot_implementation: stub    # one of: stub | ev3 | spike
class_to_bin:
  A: 1
  B: 2
  C: 3
home_encoder_target: 0        # degrees; calibration writes this
bin_encoder_targets:          # degrees per bin; calibration writes these
  1: 0
  2: 120
  3: 240
motor_speed_deg_per_sec: 180
cycle_watchdog_timeout_s: 30
log_dir: logs

# Phase 2 orchestrator endpoint (D-05). Leave commented/empty to run standalone (D-06, ORC-04).
# Format: ws://<host>:<port>/ws  (no role query — ws_client adds ?role=station)
orchestrator_url: ws://127.0.0.1:8000/ws

# CAM-01: camera-triggered approach — bug walks to QR scan point when camera opens
# Set qr_approach_enabled: true to activate. qr_approach_encoder_target: null = use home position.
qr_approach_enabled: false
qr_approach_encoder_target: null

# NAV-01: QR visual navigation (camera en robot, run: python web_nav.py)
# nav_robot: stub (simulado) | nxt (brick LEGO NXT conectado por USB)
nav_robot: nxt
nav_arrived_area_pct: 0.15   # QR ocupa 15% del frame → llegó
nav_center_tol_px: 60        # px tolerancia al centro antes de girar
nav_drive_speed: 95          # velocidad adelante 0-100
nav_turn_speed: 85           # velocidad de giro 0-100
nav_motor_left_port: A       # puerto motor izquierdo (A/B/C)
nav_motor_right_port: C      # puerto motor derecho  (A/B/C)
nav_invert_left: false       # true si la rueda izquierda gira al revés
nav_invert_right: false      # true si la rueda derecha gira al revés

# Obstacle detection — OBS-01 (set obstacle_detection_enabled: true to activate)
# Uses yolov8n.pt (COCO, already in repo root) to detect objects in the robot's path.
# obstacle_classes: []           # empty = all 80 COCO classes count as obstacles
#                                # e.g. [0] = person only, [0, 56, 57] = person+chair+couch
# obstacle_roi: [10, 30, 90, 90] # [x1%, y1%, x2%, y2%] — crop to robot travel zone only
obstacle_detection_enabled: false
obstacle_model_path: yolov8n.pt
obstacle_confidence_threshold: 0.50
obstacle_classes: []
obstacle_roi: null

# Phase 02.1 — vision-based robot QR tracking (observability overlay, default off)
vision_confirm_enabled: false                  # D-16: set true to activate post-motion QR check
vision_confirm_tolerance_px: 30               # D-13: Euclidean pixel drift threshold
robot_vision_targets:                         # D-11: expected ROBOT-QR pixel centers per position
  home: null
  bin_1: null
  bin_2: null
  bin_3: null
